# Configuration for SeeMore.

# Please don't change this!
version: 8

# The delay (in ticks) before a player's view distance is lowered after their client settings change.
#  * This stops players overloading the server by constantly changing their view distance.
update-delay: 600

# Whether the plugin should log to the console when it changes a player's view distance.
log-changes: true

# These settings can be specified per world.
#  * Note: If a world is not listed here or if a setting is missing, it will use the settings listed under the default
#    section.
world-settings:
  default:
    # The maximum view distance a player in this world can have.
    # Set to -1 to use the server's configured view distance for this world.
    maximum-view-distance: -1

# Permission overrides are checked from top to bottom. The first matching permission wins.
permissions:
  # Exact group world override -> top-level exact world -> group default override -> top-level default.
  group-overrides: []

# Reduce the view distance of inactive players without treating passive position changes as activity.
afk:
  enabled: true
  # AFK status can take up to this much extra time to be noticed.
  check-interval: 1m
  timeout: 15m
  maximum-view-distance: 10
  # Skip AFK mode when it would save fewer than this many chunks of radius.
  minimum-reduction: 3
  # Blank messages are completely silent. Non-blank messages support Adventure MiniMessage formatting.
  alerts:
    reduced-message: ""
    restoring-message: ""
  wake-up:
    # Keyboard input and deliberate actions wake immediately. Camera motion uses these safeguards.
    minimum-look-change: 2.0
    required-look-events: 2
    look-event-window: 2s

# Experimental, opt-in reduction for active players who remain below the local surface.
# AFK mode takes precedence over underground mode.
underground:
  enabled: false
  # Allow seemore.underground.bypass to exempt individual players.
  # Permission grants are ignored while this is false.
  enable-bypass-permission: false
  # Whether the worlds below are the only included worlds or the excluded worlds.
  world-list-mode: whitelist
  worlds:
    - world
  # Detection uses one cached heightmap lookup per eligible active player each interval.
  check-interval: 5s
  enter-after: 2m
  exit-after: 5s
  # Required distance between the player's eye and the local surface.
  minimum-depth: 10
  # Once underground, the player must get this close to the surface before the exit timer begins.
  exit-depth: 5
  maximum-view-distance: 8
  # Require the nearest solid ceiling to look like naturally generated underground terrain.
  natural-ceiling:
    enabled: true
    # Air, water, and other passable blocks are ignored up to this distance.
    search-distance: 32
    # Number of consecutive natural blocks required at and above the ceiling.
    minimum-thickness: 2
    # Material enum names that should be added to or removed from the built-in conservative list.
    additional-materials: []
    excluded-materials: []
