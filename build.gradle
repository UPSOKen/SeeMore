plugins {
    id 'com.gradleup.shadow' version '9.5.1'
    id 'java'
}

group = 'com.froobworld'
version = '2.1.0'
jar.enabled = false

repositories {
    mavenCentral()
    maven {
        url = uri('https://repo.papermc.io/repository/maven-public/')
    }
}

dependencies {
    compileOnly 'io.papermc.paper:paper-api:26.1.2.build.+'
    implementation 'org.bstats:bstats-base:3.0.1'

    testImplementation 'io.papermc.paper:paper-api:26.1.2.build.+'
    testImplementation 'org.junit.jupiter:junit-jupiter:5.13.4'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

def pluginVersion = version.toString()
processResources {
    inputs.property('version', pluginVersion)
    filesMatching('plugin.yml') {
        expand(version: pluginVersion)
    }
}

shadowJar {
    archiveFileName = 'SeeMore-' + project.version.toString() + '.jar'

    relocate 'org.bstats','com.froobworld.seemore.lib.bstats'
}

artifacts {
    shadowJar
}

assemble.dependsOn(shadowJar)

test {
    useJUnitPlatform()
}
